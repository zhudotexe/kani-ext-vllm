name: Test Package

on: [ push, pull_request ]

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  GH_TOKEN: ${{ github.token }}
  UV_SYSTEM_PYTHON: 1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install vLLM CPU
        run: |
          export VLLM_VERSION=$(curl -s https://api.github.com/repos/vllm-project/vllm/releases/latest | jq -r .tag_name | sed 's/^v//')
          uv pip install https://github.com/vllm-project/vllm/releases/download/v${VLLM_VERSION}/vllm-${VLLM_VERSION}+cpu-cp38-abi3-manylinux_2_35_x86_64.whl --torch-backend cpu

      - name: Install dependencies
        run: uv pip install -Ur requirements.txt

      # download models
      - name: Cache HF models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models

      - name: Download HF models
        run: |
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --exclude "original/*"

      - name: Test with pytest
        run: pytest --ignore=_vllm -s

